<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smartphone Infographic Generator – Galaxy S26 Ultra vs iPhone 17 Pro Max</title>
  <meta name="description" content="Generate side-by-side smartphone comparison infographics comparing Samsung Galaxy S26 Ultra and iPhone 17 Pro Max specifications and pricing.">

  <!-- Open Graph -->
  <meta property="og:title" content="Smartphone Infographic Generator">
  <meta property="og:description" content="Side-by-side Galaxy S26 Ultra vs iPhone 17 Pro Max comparison infographics.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="/og-image.png">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Smartphone Infographic Generator">
  <meta name="twitter:description" content="Side-by-side Galaxy S26 Ultra vs iPhone 17 Pro Max comparison infographics.">

  <!-- Canonical -->
  <link rel="canonical" href="/">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .container {
      max-width: 720px;
      width: 100%;
      background: #1e293b;
      border-radius: 16px;
      padding: 48px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      border: 1px solid #334155;
    }
    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #3b82f6, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle {
      color: #94a3b8;
      font-size: 1.05rem;
      margin-bottom: 2rem;
      line-height: 1.6;
    }
    .phone-selector {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 28px;
    }
    .phone-card {
      background: #0f172a;
      border: 2px solid #334155;
      border-radius: 12px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    .phone-card:hover {
      border-color: #3b82f6;
      transform: translateY(-2px);
    }
    .phone-card.selected {
      border-color: #3b82f6;
      background: rgba(59, 130, 246, 0.1);
    }
    .phone-card.selected.phone2 {
      border-color: #ef4444;
      background: rgba(239, 68, 68, 0.1);
    }
    .phone-card h3 {
      font-size: 1.1rem;
      margin-bottom: 4px;
    }
    .phone-card .brand {
      color: #94a3b8;
      font-size: 0.9rem;
    }
    .phone-card .selector-indicator {
      display: inline-block;
      margin-top: 8px;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      background: #334155;
      color: #94a3b8;
    }
    .phone-card.selected .selector-indicator {
      background: #3b82f6;
      color: #fff;
    }
    .phone-card.selected.phone2 .selector-indicator {
      background: #ef4444;
      color: #fff;
    }
    .generate-btn {
      width: 100%;
      padding: 16px 32px;
      font-size: 1.1rem;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      color: #fff;
      transition: all 0.2s;
      letter-spacing: 0.02em;
    }
    .generate-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(59, 130, 246, 0.4);
    }
    .generate-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .result {
      margin-top: 32px;
      text-align: center;
    }
    .result img {
      max-width: 100%;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
    }
    .error-msg {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5;
      padding: 12px 20px;
      border-radius: 10px;
      margin-top: 20px;
      font-size: 0.95rem;
    }
    .spinner {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .legend {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-bottom: 20px;
      font-size: 0.85rem;
      color: #94a3b8;
    }
    .legend-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }
    .legend-dot.blue { background: #3b82f6; }
    .legend-dot.red { background: #ef4444; }
    @media (max-width: 640px) {
      .container { padding: 28px 20px; }
      .phone-selector { grid-template-columns: 1fr; }
      h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Infographic Generator</h1>
    <p class="subtitle">
      Generate a side-by-side smartphone comparison infographic.
      Select one phone for each column below.
    </p>

    <div class="legend">
      <span><span class="legend-dot blue"></span> Phone 1 (left column)</span>
      <span><span class="legend-dot red"></span> Phone 2 (right column)</span>
    </div>

    <div class="phone-selector" id="phoneSelector">
      <div class="phone-card" data-id="galaxy-s26-ultra" data-role="phone1">
        <h3>Galaxy S26 Ultra</h3>
        <p class="brand">Samsung</p>
        <div class="selector-indicator">Select as Phone 1</div>
      </div>
      <div class="phone-card" data-id="iphone-17-pro-max" data-role="phone2">
        <h3>iPhone 17 Pro Max</h3>
        <p class="brand">Apple</p>
        <div class="selector-indicator">Select as Phone 2</div>
      </div>
    </div>

    <button class="generate-btn" id="generateBtn" disabled>
      Select a phone for each column to begin
    </button>

    <div class="result" id="result"></div>
  </div>

  <script>
    (function () {
      const phoneCards = document.querySelectorAll('.phone-card');
      const generateBtn = document.getElementById('generateBtn');
      const resultEl = document.getElementById('result');

      let selected = { phone1: null, phone2: null };

      phoneCards.forEach(card => {
        card.addEventListener('click', () => {
          const id = card.dataset.id;
          const role = card.dataset.role;

          // Toggle: if this card is already selected for its role, deselect
          if (selected[role] === id) {
            selected[role] = null;
            card.classList.remove('selected', 'phone2');
          } else {
            // If the other role has the same id, swap roles
            const otherRole = role === 'phone1' ? 'phone2' : 'phone1';
            if (selected[otherRole] === id) {
              selected[otherRole] = null;
              document.querySelector(`[data-role="${otherRole}"]`)?.classList.remove('selected', 'phone2');
            }
            selected[role] = id;
            card.classList.add('selected');
            if (role === 'phone2') card.classList.add('phone2');
          }

          updateUI();
        });
      });

      function updateUI() {
        // Update card styles
        phoneCards.forEach(card => {
          const id = card.dataset.id;
          const role = card.dataset.role;
          if (selected[role] === id) {
            card.classList.add('selected');
            if (role === 'phone2') card.classList.add('phone2');
            card.querySelector('.selector-indicator').textContent =
              role === 'phone1' ? 'Phone 1 (Left)' : 'Phone 2 (Right)';
          } else {
            card.classList.remove('selected', 'phone2');
            card.querySelector('.selector-indicator').textContent =
              'Select as ' + (card.dataset.role === 'phone1' ? 'Phone 1' : 'Phone 2');
          }
        });

        // Update button
        if (selected.phone1 && selected.phone2) {
          generateBtn.disabled = false;
          generateBtn.textContent = 'Generate Infographic';
        } else {
          generateBtn.disabled = true;
          if (!selected.phone1 && !selected.phone2) {
            generateBtn.textContent = 'Select a phone for each column to begin';
          } else {
            generateBtn.textContent = 'Select one more phone to continue';
          }
        }
      }

      generateBtn.addEventListener('click', async () => {
        if (!selected.phone1 || !selected.phone2) return;

        generateBtn.disabled = true;
        generateBtn.innerHTML = '<span class="spinner"></span> Generating...';
        resultEl.innerHTML = '';

        try {
          const res = await fetch('/generate-infographic', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ phone1: selected.phone1, phone2: selected.phone2 }),
          });

          if (!res.ok) {
            const errData = await res.json();
            throw new Error(errData.error || `Server error (${res.status})`);
          }

          const blob = await res.blob();
          const url = URL.createObjectURL(blob);

          resultEl.innerHTML = `
            <img src="${url}" alt="Smartphone comparison infographic: ${selected.phone1} vs ${selected.phone2}"
                 style="max-width:100%;border-radius:12px;">
            <p style="margin-top:12px;color:#94a3b8;font-size:0.9rem;">
              Right-click or long-press the image to save as PNG
            </p>`;
        } catch (err) {
          resultEl.innerHTML = `<div class="error-msg">${err.message}</div>`;
        } finally {
          generateBtn.disabled = false;
          generateBtn.innerHTML = 'Generate Infographic';
        }
      });
    })();
  </script>
</body>
</html>
